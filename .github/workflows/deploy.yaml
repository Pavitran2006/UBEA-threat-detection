name: Deploy to EKS

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v2

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build, tag, and push image to Amazon ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/ueba-gateway:$IMAGE_TAG ./distributed/gateway
        docker push $ECR_REGISTRY/ueba-gateway:$IMAGE_TAG
        # Repeat for other services...

    - name: Update Kubeconfig
      run: aws eks update-kubeconfig --name ueba-cluster

    - name: Deploy to EKS
      run: |
        kubectl apply -f k8s/common.yaml
        kubectl apply -f k8s/gateway.yaml
        kubectl apply -f k8s/analytics.yaml
        kubectl apply -f k8s/risk.yaml
