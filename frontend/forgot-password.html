<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UEBA | Forgot Password</title>
  <link rel="stylesheet" href="/static/css/soc.css">
</head>
<body class="app-body">
  <div class="background"></div>
  <div class="bubbles">
    <span></span><span></span><span></span><span></span><span></span><span></span>
  </div>

  <nav class="nav">
    <div class="logo">UEBA</div>
    <div class="links">
      <a href="/" data-auth="guest">Home</a>
      <a href="/login" data-auth="guest">Login</a>
      <a href="/signup" data-auth="guest">Signup</a>
    </div>
  </nav>

  <main class="main">
    <section class="auth">
      <div class="auth-card">
        <h2>Forgot Password</h2>
        <div id="auth-message" class="alert" style="display: none;"></div>
        <form class="form" id="forgot-form">
          <label>Email or Phone</label>
          <input id="forgot-identifier" type="text" required>
          <button class="primary-btn" type="submit">Send OTP</button>
        </form>
      </div>
    </section>
  </main>

  <script src="/static/js/forgot.js"></script>
</body>
</html>
