apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: ueba-saas
spec:
  replicas: 3
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: <ECR_URI>/ueba-auth:latest
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: ueba-platform-config
            - secretRef:
                name: ueba-platform-secrets
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
---
