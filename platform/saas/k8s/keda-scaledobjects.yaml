apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: risk-service-kafka-lag
  namespace: ueba-saas
spec:
  scaleTargetRef:
    name: risk-service
  minReplicaCount: 2
  maxReplicaCount: 20
  pollingInterval: 10
  cooldownPeriod: 60
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka.ueba-saas.svc.cluster.local:9092
        consumerGroup: adaptive-risk-group-session-anomaly
        topic: session_anomaly_events
        lagThreshold: "100"
---
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: analytics-service-kafka-lag
  namespace: ueba-saas
spec:
  scaleTargetRef:
    name: analytics-service
  minReplicaCount: 2
  maxReplicaCount: 20
  pollingInterval: 10
  cooldownPeriod: 60
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka.ueba-saas.svc.cluster.local:9092
        consumerGroup: continuous-analytics-group
        topic: session_events
        lagThreshold: "120"

