<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Forgot Password - UEBA Security Intelligence Platform">
    <title>Forgot Password | UEBA Security</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    <style>
        /* inline styles omitted for brevity... */
    </style>
</head>
<body>
    <div class="container">
        <div class="card forgot-password-container">
            <div class="card-header">
                <div class="card-icon"><i class="fas fa-key"></i></div>
                <h1 class="card-title">Forgot Password</h1>
                <p class="card-subtitle">Enter your email to receive reset instructions.</p>
            </div>
            <form class="forgot-form" method="POST" action="/forgot-password">
                <div class="form-group">
                    <label class="label" for="email">Email Address</label>
                    <input class="input-field" type="email" name="email" id="email" placeholder="you@example.com" required>
                </div>
                <button class="btn-submit" type="submit">Send Reset Link</button>
            </form>
            {% if error %}
                <p class="status-error">{{ error }}</p>
            {% endif %}
        </div>
    </div>
</body>
</html>
