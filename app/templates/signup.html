{% extends "base.html" %}
{% block title %}Create Account | UEBA Security Platform{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-icon-wrap">
            <div class="auth-icon"><i class="fas fa-network-wired"></i></div>
        </div>
        <h2>Create Operative</h2>
        <p class="sub">Register to join the UEBA security network</p>

        {% if error %}
        <div class="flash flash-error"><i class="fas fa-circle-exclamation"></i> {{ error }}</div>
        {% endif %}

        <form action="/signup" method="POST">
            <div class="form-group">
                <label class="form-label" for="username"><i class="fas fa-user"></i> Username</label>
                <input class="form-control" type="text" id="username" name="username" placeholder="analyst01" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="email"><i class="fas fa-envelope"></i> Email</label>
                <input class="form-control" type="email" id="email" name="email" placeholder="analyst@ueba.sec" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="phone"><i class="fas fa-phone"></i> Phone Number</label>
                <input class="form-control" type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password"><i class="fas fa-key"></i> Password</label>
                <input class="form-control" type="password" id="password" name="password" placeholder="••••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" style="margin-top:0.5rem;">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>

        <div class="auth-foot">
            <p>Already registered? <a href="/login">Login here</a></p>
        </div>
    </div>
</div>

<script>
document.querySelector('form').addEventListener('submit', async function(e) {
    const form = e.target;
    if (form.getAttribute('data-ajax-enabled')) return;
    e.preventDefault();
    
    const btn = form.querySelector('button');
    const originalHtml = btn.innerHTML;
    const formData = new FormData(form);
    
    // UI state
    btn.disabled = true;
    btn.innerHTML = `<i class="fas fa-satellite-dish animate-pulse"></i> Capturing Location...`;
    
    let location = { lat: null, lon: null };

    // 1. Capture GPS Location
    try {
        const geoPromise = new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, {
                enableHighAccuracy: true,
                timeout: 5000,
                maximumAge: 0
            });
        });
        const timeoutPromise = new Promise(resolve => setTimeout(() => resolve(null), 5500));
        const position = await Promise.race([geoPromise, timeoutPromise]);
        
        if (position && position.coords) {
            location.lat = position.coords.latitude;
            location.lon = position.coords.longitude;
        }
    } catch (err) {
        console.warn("Signup Geolocation failed:", err.message);
    }

    btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Creating Account...`;
    
    // 2. Perform Form Submission
    try {
        form.setAttribute('data-ajax-enabled', 'true');
        const response = await fetch('/signup', {
            method: 'POST',
            body: formData,
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        });
        
        if (response.redirected) {
            window.location.href = response.url;
        } else {
            const text = await response.text();
            if (text.includes("flash-error")) {
                // If it returned a template (error), replace the body or redirect
                document.open();
                document.write(text);
                document.close();
            } else {
                window.location.href = "/verify-otp";
            }
        }
    } catch (err) {
        console.error("Signup Error:", err);
        btn.disabled = false;
        btn.innerHTML = originalHtml;
    }
});
</script>
{% endblock %}
