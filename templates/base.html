<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UEBA - User & Entity Behaviour Analytics{% endblock %}</title>
    <!-- Fonts and Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-dark: #020617;
            --bg-grad: #0f172a;
            --accent-blue: #3b82f6;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --cyber-glow: 0 0 10px rgba(59, 130, 246, 0.5);
            --danger-red: #ef4444;
            --success-green: #10b981;
        }

        body {
            margin: 0;
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-grad) 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Fixed Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 3rem;
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
            z-index: 1000;
            box-sizing: border-box;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-shadow: var(--cyber-glow);
        }

        .navbar-brand i {
            color: var(--accent-blue);
        }

        .navbar-nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-dim);
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--accent-blue);
            text-shadow: var(--cyber-glow);
        }

        /* Main Content Padding to account for fixed navbar */
        .main-content {
            flex: 1;
            padding-top: 80px; /* Navbar height buffer */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Common Cyber Classes */
        .cyber-card {
            background: var(--card-bg);
            border: 1px solid rgba(59, 130, 246, 0.2);
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            transition: all 0.3s ease;
        }

        .cyber-card:hover {
            border-color: rgba(59, 130, 246, 0.6);
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .cyber-btn {
            background: var(--accent-blue);
            color: #fff;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);
        }

        .cyber-btn:hover {
            background: #2563eb;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.6);
            transform: translateY(-2px);
        }

        .cyber-btn-outline {
            background: transparent;
            color: var(--accent-blue);
            border: 1px solid var(--accent-blue);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .cyber-btn-outline:hover {
            background: rgba(59, 130, 246, 0.1);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            transform: translateY(-2px);
        }

        .cyber-btn-danger {
            background: transparent;
            color: var(--danger-red);
            border: 1px solid var(--danger-red);
        }
        .cyber-btn-danger:hover {
            background: rgba(239, 68, 68, 0.1);
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
            color: var(--danger-red);
        }

        .cyber-btn-success {
            background: transparent;
            color: var(--success-green);
            border: 1px solid var(--success-green);
        }
        .cyber-btn-success:hover {
            background: rgba(16, 185, 129, 0.1);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
            color: var(--success-green);
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

    <!-- Fixed Navbar -->
    <nav class="navbar">
        <a href="/" class="navbar-brand">UEBA</a>
        <div class="navbar-nav menu">
            <a href="/" class="nav-link">Home</a>
            <a href="/dashboard" class="nav-link">Dashboard</a>
            <a href="/signup" class="nav-link">Signup</a>
            <a href="/login" class="nav-link">Login</a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    {% block extra_js %}{% endblock %}

</body>
</html>
