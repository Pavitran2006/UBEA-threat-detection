{% extends "base.html" %}

{% block title %}Signup | UEBA Platform{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        width: 100%;
        max-width: 450px;
        margin: 4rem auto;
    }

    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }

    .auth-header h2 {
        font-size: 2rem;
        margin-bottom: 0.5rem;
    }

    .auth-header p {
        color: var(--text-dim);
    }

    .form-group {
        margin-bottom: 1.25rem;
    }

    .form-label {
        display: block;
        margin-bottom: 0.5rem;
        font-size: 0.9rem;
        color: var(--text-dim);
    }

    .form-input {
        width: 100%;
        padding: 0.75rem 1rem;
        background: rgba(15, 23, 42, 0.5);
        border: 1px solid rgba(59, 130, 246, 0.3);
        border-radius: 8px;
        color: var(--text-main);
        font-family: inherit;
        font-size: 1rem;
        box-sizing: border-box;
        transition: all 0.3s ease;
    }

    .form-input:focus {
        outline: none;
        border-color: var(--accent-blue);
        box-shadow: 0 0 10px rgba(59, 130, 246, 0.2);
    }

    .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: var(--text-dim);
    }

    .auth-link {
        color: var(--accent-blue);
        text-decoration: none;
        font-weight: 600;
    }

    .auth-link:hover {
        text-decoration: underline;
    }
    
    .btn-block {
        width: 100%;
        justify-content: center;
        margin-top: 1.5rem;
    }

    .alert {
        padding: 1rem;
        border-radius: 8px;
        margin-bottom: 1.5rem;
        font-size: 0.9rem;
        display: flex;
        align-items: center;
        gap: 0.5rem;
    }

    .alert-error {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.5);
        color: var(--danger-red);
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="cyber-card">
        <div class="auth-header">
            <h2>Initialize Access</h2>
            <p>Create your secure SOC operator account</p>
        </div>

        {% if error %}
        <div class="alert alert-error">
            <i class="fas fa-exclamation-triangle"></i> {{ error }}
        </div>
        {% endif %}

        <form action="/signup" method="POST">
            <div class="form-group">
                <label for="username" class="form-label">Operator ID (Username)</label>
                <input type="text" id="username" name="username" class="form-input" placeholder="e.g. analyst01" required>
            </div>

            <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" name="email" class="form-input" placeholder="name@security.com" required>
            </div>
            
            <div class="form-group">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" id="phone" name="phone" class="form-input" placeholder="+1 (555) 000-0000" required>
            </div>

            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="cyber-btn btn-block">
                Initialize Account <i class="fas fa-user-shield"></i>
            </button>
        </form>

        <div class="auth-footer">
            Already have clearance? <a href="/login" class="auth-link">Login here</a>
        </div>
    </div>
</div>
{% endblock %}
