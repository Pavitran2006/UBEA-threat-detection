metadata:
  name: analytics-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8001"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics
  template:
    metadata:
      labels:
        app: analytics
    spec:
      containers:
      - name: analytics
        image: your-ecr-repo/ueba-analytics:latest
        envFrom:
        - configMapRef:
            name: ueba-cm
      - name: mlflow-sidecar
        image: mlflow/mlflow:latest
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
spec:
  selector:
    app: analytics
  ports:
  - protocol: TCP
    port: 8001
    targetPort: 8001
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: analytics-net-policy
spec:
  podSelector:
    matchLabels:
      app: analytics
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: gateway
    ports:
    - protocol: TCP
      port: 8001
