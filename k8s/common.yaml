apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ueba-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: ueba-saas.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gateway-service
            port:
              number: 80
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ueba-cm
data:
  KAFKA_BOOTSTRAP_SERVERS: "kafka-service:9092"
  ELASTICSEARCH_URL: "http://elasticsearch:9200"
  DATABASE_URL: "mysql+pymysql://root:password@mysql-service/ueba_db"
  MLFLOW_TRACKING_URI: "http://mlflow-service:5000"
---
apiVersion: v1
kind: Secret
metadata:
  name: ueba-secrets
type: Opaque
data:
  # Base64 encoded secrets (In production, use AWS Secrets Manager or HashiCorp Vault)
  JWT_SECRET_KEY: "Y3liZXItZ3VhcmQtc3VwZXItc2VjcmV0LTIwMjY="
